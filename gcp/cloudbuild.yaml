steps:
  # ── Build Backend ───────────────────────────────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/backend:latest
      - ./backend
    waitFor: ["-"]

  # ── Build Frontend ──────────────────────────────────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/frontend:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/frontend:latest
      - ./frontend
    waitFor: ["-"]

  # ── Push Backend ────────────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/backend
    waitFor: [build-backend]

  # ── Push Frontend ───────────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/frontend
    waitFor: [build-frontend]

  # ── Deploy Backend to Cloud Run ─────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lexguard-backend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --min-instances=1
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --set-secrets=LLAMAPARSE_API_KEY=LLAMAPARSE_API_KEY:latest,HF_API_KEY=HF_API_KEY:latest,QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,NVIDIA_API_KEY=NVIDIA_API_KEY:latest,LANGSMITH_API_KEY=LANGSMITH_API_KEY:latest,NEON_DATABASE_URL=NEON_DATABASE_URL:latest
      - --set-env-vars=EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2,EMBEDDING_DIMENSIONS=384,QDRANT_COLLECTION=lexguard_contracts,NVIDIA_MODEL=nvidia/nemotron-3-super-120b-a12b,NVIDIA_TIMEOUT=300,NVIDIA_MAX_RETRIES=10,MAX_RAG_RETRIES=3,MAX_HISTORY_MESSAGES=10,RETRIEVAL_TOP_K=10,QUALITY_THRESHOLD=0.2,MAX_UPLOAD_SIZE_MB=50
    waitFor: [push-backend]

  # ── Deploy Frontend to Cloud Run ────────────────────────────────────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lexguard-frontend
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/frontend:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=NEXT_PUBLIC_API_URL=https://lexguard-backend-PLACEHOLDER.run.app
    waitFor: [push-frontend]

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/backend:$SHORT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/lexguard/frontend:$SHORT_SHA
